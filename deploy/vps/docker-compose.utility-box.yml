services:
  utility-box-db:
    container_name: utility-box-db
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ./env/utility-box.db.env
    volumes:
      - utility_box_pgdata:/var/lib/postgresql/data
    networks:
      - utility_box_net

  utility-box-api:
    container_name: utility-box-api
    build:
      context: ../..
      dockerfile: deploy/vps/Dockerfile.api
    restart: unless-stopped
    env_file:
      - ./env/utility-box.api.env
    depends_on:
      - utility-box-db
    volumes:
      - utility_box_uploads:/data/uploads
    networks:
      - utility_box_net

  utility-box-web:
    container_name: utility-box-web
    build:
      context: ../..
      dockerfile: deploy/vps/Dockerfile.web
    restart: unless-stopped
    env_file:
      - ./env/utility-box.web.env
    depends_on:
      - utility-box-api
    ports:
      - "3100:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - utility_box_net

networks:
  utility_box_net:
    name: utility_box_net

volumes:
  utility_box_pgdata:
  utility_box_uploads:
