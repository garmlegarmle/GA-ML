server {
  listen 80;
  server_name ga-ml.com;
  return 301 https://www.ga-ml.com$request_uri;
}

server {
  listen 80;
  server_name www.ga-ml.com;
  # If the VPS already uses HTTPS origin termination, copy this location block into
  # the existing 443 server instead of using this HTTP-only example directly.

  location / {
    proxy_pass http://127.0.0.1:3100;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}
