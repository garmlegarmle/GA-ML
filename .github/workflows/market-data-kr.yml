name: Sync KR Market Data
run-name: Sync KR Market Data / ${{ github.event.inputs.request_id || github.event.inputs.tickers || 'schedule' }}

on:
  schedule:
    - cron: '0 7 * * 1-5'
  workflow_dispatch:
    inputs:
      tickers:
        description: Optional override for KR tickers (comma, space, or newline separated)
        required: false
        type: string
      request_id:
        description: Optional request id for on-demand sync tracking
        required: false
        type: string
      retain_max_rows:
        description: Maximum number of recent rows to keep per ticker after sync
        required: false
        type: string
      initial_lookback_days:
        description: Initial backfill lookback in calendar days for new tickers
        required: false
        type: string

permissions:
  contents: read

jobs:
  sync-kr-market-data:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      MARKET_DATA_DATABASE_URL: ${{ secrets.MARKET_DATA_DATABASE_URL }}
      MARKET_DATA_KR_TICKERS: ${{ github.event.inputs.tickers || vars.MARKET_DATA_KR_TICKERS }}
      MARKET_DATA_RETAIN_MAX_ROWS: ${{ github.event.inputs.retain_max_rows || vars.MARKET_DATA_RETAIN_MAX_ROWS || '260' }}
      MARKET_DATA_INITIAL_LOOKBACK_DAYS: ${{ github.event.inputs.initial_lookback_days || vars.MARKET_DATA_INITIAL_LOOKBACK_DAYS || '730' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install market-data dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r .github/requirements/market-data.txt

      - name: Validate workflow inputs
        run: |
          test -n "$MARKET_DATA_DATABASE_URL"
          test -n "$MARKET_DATA_KR_TICKERS"

      - name: Sync KR OHLCV to PostgreSQL
        run: |
          python scripts/sync_market_data.py \
            --market kr \
            --tickers "$MARKET_DATA_KR_TICKERS" \
            --initial-lookback-days "$MARKET_DATA_INITIAL_LOOKBACK_DAYS" \
            --retain-max-rows "$MARKET_DATA_RETAIN_MAX_ROWS" \
            --retries 3
